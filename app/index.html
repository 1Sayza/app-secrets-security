<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login Seguro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0f172a, #020617);
      font-family: Arial, sans-serif;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #020617;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #cbd5f5;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .error {
      margin-top: 12px;
      color: #dc2626;
      font-size: 14px;
    }

    .success {
      margin-top: 12px;
      color: #16a34a;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>Login Seguro</h2>

    <input
      type="text"
      id="username"
      placeholder="Usuário"
      autocomplete="username"
    />

    <input
      type="password"
      id="password"
      placeholder="Senha"
      autocomplete="current-password"
    />

    <button onclick="login()">Entrar</button>

    <div id="message"></div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      message.innerHTML = "";

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        const data = await response.json();

        if (!response.ok) {
          message.innerHTML = `<div class="error">${data.error}</div>`;
          return;
        }

        message.innerHTML = `<div class="success">Login realizado com sucesso!</div>`;
        console.log("Usuário logado:", data.user);

      } catch (err) {
        message.innerHTML = `<div class="error">Erro ao conectar com o servidor</div>`;
      }
    }
  </script>
</body>
</html>
