services:
  app:
    build: ./app
    container_name: secure-app
    ports:
      - "3000:3000"
    volumes:
      - ./vault/agent:/vault/agent:ro
    environment:
      VAULT_ADDR: https://vault:8200
      VAULT_TOKEN_PATH: /vault/agent/token
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    networks:
      - vault-net

networks:
  vault-net:
    external: true

