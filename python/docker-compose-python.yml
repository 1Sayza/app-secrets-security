services:
  python-app:
    build: .
    image: simple-python-app:1
    container_name: simple-python-app
    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      VAULT_ADDR: "https://vault:8200"
      VAULT_TOKEN_PATH: "/vault/agent/token"
      VAULT_DB_CREDS_PATH: "database/creds/app-db"
      REQUESTS_CA_BUNDLE: "/etc/ssl/certs/vault-ca.crt"

      PGHOST: "postgres"
      PGDATABASE: "sara_db"
      PGPORT: "5432"

      APP_DEBUG: "1"

    volumes:
      - /home/sara/vault-lab/vault/tls/ca.crt:/etc/ssl/certs/vault-ca.crt:ro
      - /home/sara/vault-lab/vault/agent/token:/vault/agent/token:ro
      - python-app-data:/data

    networks:
      - vaultlab-net

volumes:
  python-app-data:

networks:
  vaultlab-net:
    external: true
