services:
  python-app:
    build: .
    image: simple-python-app:1
    container_name: simple-python-app
    restart: unless-stopped

    ports:
      - "3001:3000"

    env_file:
      - ../vault/agent/db.env

    environment:
      VAULT_ADDR: "https://vault:8200"
      REQUESTS_CA_BUNDLE: "/etc/ssl/certs/vault-ca.crt"
      PGHOST: "postgres"
      PGDATABASE: "sara_db"
      PGPORT: "5432"

    volumes:
      - ../vault/tls/ca.crt:/etc/ssl/certs/vault-ca.crt:ro
      - ../vault/agent:/vault/agent:ro
      - python-app-data:/data

    networks:
      - vaultlab-net

volumes:
  python-app-data:

networks:
  vaultlab-net:
    external: true

